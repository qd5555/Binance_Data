name: Binance Daily ETL

on:
  schedule:
    # Run every 5 minutes
    - cron: "*/5 * * * *"

  workflow_dispatch:

jobs:
  update-binance:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update Binance Daily Price
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
        run: |
          python scripts/update_binance_data.py

      - name: Update Funding Rate
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
        run: |
          python scripts/fetch_funding_rate.py

      - name: Update Symbol Metadata
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
        run: |
          python scripts/fetch_metadata.py

      - name: Update Market Cap
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
        run: |
          python scripts/fetch_market_cap.py