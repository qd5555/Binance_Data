name: Collect Binance Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          DB_CONNECTION_STRING: ${{ secrets.SUPABASE_URL }}
        run: python scripts/fetch_binance_data.py
        
      - name: Run funding rate script
        env:
          DB_CONNECTION_STRING: ${{ secrets.SUPABASE_URL }}
        run: python scripts/fetch_funding_rate.py